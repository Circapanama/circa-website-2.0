<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Circa Panama Real Estate</title>
<meta name="description" content="Our property projects across Playa Venao, Villa Marina, Blue Venao, La Playita and more.">
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--accent:#2563EB;--dark:#1E293B;--gray:#64748B;--light:#F1F5F9;--font-display:'DM Serif Display',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif}
  body{font-family:var(--font-body);background:#fff;color:var(--dark);line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:var(--font-display);font-weight:400;line-height:1.1}
  a{text-decoration:none;color:inherit}
  img{max-width:100%;display:block}
  .nav{position:fixed;top:0;left:0;width:100%;z-index:9999;padding:1.2rem 5vw;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(37,99,235,0.1)}
  .nav-logo img{height:36px}
  .nav-links{display:flex;gap:2.5rem;align-items:center}
  .nav-links a{font-size:.8rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);transition:color .3s}
  .nav-links a:hover{color:var(--accent)}
  .nav-links .nav-cta{padding:10px 28px;background:var(--accent);color:#fff!important;border-radius:50px;font-weight:700;font-size:.75rem!important}
  @media (max-width:768px){.nav-links{display:none}}
  .hero{padding:9rem 5vw 2rem;text-align:left;max-width:1200px;margin:0 auto}
  .hero .eyebrow{font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .hero h1{font-size:2.6rem;margin:.5rem 0 .5rem}
  .hero p{color:var(--gray);max-width:55ch}
  .grid{max-width:1200px;margin:2rem auto 6rem;padding:0 5vw;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem}
  .card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 10px 30px rgba(0,0,0,.05);transition:transform .3s,box-shadow .3s;display:block}
  .card:hover{transform:translateY(-4px);box-shadow:0 4px 12px rgba(0,0,0,.08),0 20px 40px rgba(0,0,0,.08)}
  .card-img{aspect-ratio:4/3;overflow:hidden;background:#f1f5f9;position:relative}
  .card-img img{width:100%;height:100%;object-fit:cover}
  .card-body{padding:1.3rem 1.4rem 1.5rem}
  .card-eyebrow{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .card-name{font-family:var(--font-display);font-size:1.5rem;margin:.3rem 0}
  .card-count{color:var(--gray);font-size:.9rem}
  .loading{grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray)}
  footer{padding:2rem 5vw;text-align:center;color:var(--gray);font-size:.85rem;border-top:1px solid #eee}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo"><img src="images/circa-logo-Photoroom.png" alt="Circa Panama"></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="listings.html">Listings</a>
    <a href="projects.html">Projects</a>
    <a href="index.html#about">About</a>
    <a href="book.html" class="nav-cta">Book a Call</a>
  </div>
</nav>

<section class="hero">
  <span class="eyebrow">Projects</span>
  <h1>Our Locations</h1>
  <p>Explore our developments across Playa Venao, Villa Marina, Blue Venao, La Playita and more. Each project below links to the available listings within it.</p>
</section>

<div class="grid" id="grid">
  <div class="loading">Loading projects&hellip;</div>
</div>

<footer>&copy; 2026 Circa Panama Real Estate</footer>

<script>
  fetch('listings.json', { cache: 'no-cache' })
    .then(function(r){ return r.json(); })
    .then(function(data){
      var grid = document.getElementById('grid');
      var groups = {};
      (data.properties || []).forEach(function(p){
        var loc = (p.location || '').trim();
        if (!loc) return;
        var key = loc.toLowerCase();
        if (!groups[key]) groups[key] = { name: loc, count: 0, image: null };
        groups[key].count += 1;
        if (!groups[key].image && p.images && p.images[0]) {
          groups[key].image = p.images[0].url || p.images[0].thumb;
        }
      });
      var list = Object.values(groups).sort(function(a,b){ return b.count - a.count; });
      if (!list.length) { grid.innerHTML = '<div class="loading">No projects yet.</div>'; return; }
      grid.innerHTML = list.map(function(g){
        var img = g.image || 'images/hero-playa-venao.jpg';
        var q = encodeURIComponent(g.name);
        return '<a class="card" href="listings.html?project=' + q + '">' +
          '<div class="card-img"><img src="' + img + '" alt="' + g.name + '" loading="lazy"></div>' +
          '<div class="card-body">' +
            '<div class="card-eyebrow">Project</div>' +
            '<div class="card-name">' + g.name + '</div>' +
            '<div class="card-count">' + g.count + ' ' + (g.count === 1 ? 'property' : 'properties') + ' available</div>' +
          '</div>' +
        '</a>';
      }).join('');
    })
    .catch(function(){
      document.getElementById('grid').innerHTML = '<div class="loading" style="color:#b91c1c;">Could not load projects.</div>';
    });
</script>
</body>
</html>
